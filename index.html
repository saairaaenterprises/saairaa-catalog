padding:20px;

.search-container{
position:relative;
width:90%;
max-width:400px;
margin:0 auto 10px auto;
}

#searchInput{
width:100%;
padding:10px 40px 10px 10px;
font-size:16px;
box-sizing:border-box;
display:block;
}

.clear-btn{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
font-size:20px;
cursor:pointer;
color:#888;
display:none;
}

.clear-btn:hover{
color:#000;
}

#suggestions{
max-width:400px;
margin:auto;
list-style:none;
padding:0;
margin-top:-10px;
background:#fff;
border:1px solid #ccc;
border-top:none;
z-index:1000;
position:relative;
}

#suggestions li{
padding:10px;
border-top:1px solid #ccc;
cursor:pointer;
}

#suggestions li:hover{
background-color:#f0f0f0;
}

.product-image{
width:100%;
max-width:600px;
display:block;
margin:30px auto;
border-radius:6px;
}

.highlight{
border:4px solid #ff9800;
animation:flash 1s ease-in-out;
}

@keyframes flash{
0%{border-color:#ff9800;}
50%{border-color:#fff176;}
100%{border-color:#ff9800;}
}

#backToTopBtn{
display:none;
position:fixed;
bottom:30px;
right:20px;
z-index:100;
width:50px;
height:50px;
font-size:24px;
background-color:#ff9800;
color:white;
border:none;
border-radius:50%;
cursor:pointer;
box-shadow:0px 2px 6px rgba(0,0,0,0.3);
text-align:center;
font-weight:bold;
line-height:50px;
}

#backToTopBtn:hover{
background-color:#e68900;
}

</style>

<script>

const productMap={
"henna powder":3,
"triple sifted henna powder":3,
"bridal henna powder":3,
"3 filter henna powder":3,
"5 filter henna powder":3,
"indigo powder":4,
"hair henna powder":4,
"hair henna paste":5,
"eucalyptus oil":6,
"nilgiris oil":6,
"essential oil":6,
"normal stain oil":6,
"lavender oil":7,
"rich babyshower oil":7,
"tea tree oil":8,
"rich stain oil":8,
"bridal blend oil":9,
"mehendi oil":9,
"bridal use oil":9,
"dark stain oil":9,
"beginners kit":10,
"practice use kit":10,
"bridal mehendi kit":11,
"bridal use kit":11,
"bridal mehendi cones":12,
"bridal cones combo":12,
"nail cones":13,
"nail liquid":13,
"sealant spray":14,
"practice cone":15,
"aftercare balm":16,
"henna aftercare roll on":17,
"beexwax":18,
"sheabutter":19,
"olive oil":20,
"almond oil":21
};

const searchInput=document.getElementById("searchInput")
const suggestions=document.getElementById("suggestions")
const clearBtn=document.getElementById("clearBtn")
const backToTopBtn=document.getElementById("backToTopBtn")

searchInput.addEventListener("input",function(){

const input=this.value.toLowerCase().trim()

clearBtn.style.display=input?"block":"none"

suggestions.innerHTML=""

if(input.length<2)return

const matches=Object.keys(productMap).filter(product=>product.includes(input))

matches.forEach(match=>{

const li=document.createElement("li")

li.textContent=match

li.addEventListener("click",()=>{

searchInput.value=match

suggestions.innerHTML=""

scrollToPage(productMap[match])

})

suggestions.appendChild(li)

})

})

clearBtn.addEventListener("click",function(){

searchInput.value=""

suggestions.innerHTML=""

clearBtn.style.display="none"

searchInput.focus()

})

function scrollToPage(pageNumber){

const img=document.querySelector(`img[src="downloads/${pageNumber}.jpg"]`)

if(img){

document.querySelectorAll(".product-image").forEach(i=>i.classList.remove("highlight"))

img.classList.add("highlight")

img.scrollIntoView({behavior:"smooth",block:"center"})

}

}

window.addEventListener("scroll",()=>{

if(document.documentElement.scrollTop>300){

backToTopBtn.style.display="block"

}else{

backToTopBtn.style.display="none"

}

})

backToTopBtn.addEventListener("click",()=>{

window.scrollTo({top:0,behavior:"smooth"})

})

</script>
